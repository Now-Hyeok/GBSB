name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: gbsb-api

      - name: Build
        run: ./gradlew build -x test
        working-directory: gbsb-api

      - name: Run tests
        run: ./gradlew test
        working-directory: gbsb-api
        continue-on-error: true

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gbsb-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: gbsb-web

      - name: Type check
        run: npx vue-tsc --noEmit
        working-directory: gbsb-web

      - name: Build
        run: npm run build
        working-directory: gbsb-web
