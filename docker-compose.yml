services:
  gbsb-api:
    build:
      context: ./gbsb-api
    container_name: gbsb-api
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - TNS_ADMIN=/wallet
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ${WALLET_PATH}:/wallet:ro
      - ./gbsb-api/docker-sqlnet.ora:/wallet/sqlnet.ora:ro
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  gbsb-web:
    build:
      context: ./gbsb-web
    container_name: gbsb-web
    ports:
      - "80:80"
    depends_on:
      gbsb-api:
        condition: service_healthy
